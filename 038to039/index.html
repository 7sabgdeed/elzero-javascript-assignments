<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let day = "   friday  ";
        // let day = 13435353;

        if (typeof(day) !== typeof("string") || day.length < 6) {

            console.log(`Its Not A Valid Day`);

        } else {

            if (!(day === day.trim())) {
    
                day = day.trim();
            }

            if (!(day[0] === day[0].toUpperCase()) ||
                day !== day[0].toUpperCase() + day.slice(1).toLowerCase()) {
    
                day = day[0].toUpperCase() + day.slice(1).toLowerCase();
            }
            
    
            switch (day) {

                case "Friday":
                case "Saturday":
                case "Sunday":
                    console.log(`No Appointments Available`);
                    break;

                case "Monday":
                case "Thursday":
                    console.log(`From 10:00 AM To 5:00 PM`);
                    break;

                case "Tuesday":
                    console.log(`From 10:00 AM To 6:00 PM`);
                    break;

                case "Wednesday":
                    console.log(`From 10:00 AM To 7:00 PM`);
                    break;

                default:
                    console.log(`Its Not A Valid Day`);
                    break;
            }
        }

    </script>

</body>
</html>
