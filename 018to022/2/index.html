<!DOCTYPE html>

<body>
    
    <script>

        let num = 3;

        // Solution One
        console.log(num + num); // 6

        // Solution Two
        console.log(num + true + true + true); // 6

        // Soultion Three
        console.log(num * num - num); // 6

        // Soultion Four
        console.log(num / num * num + true + true + true); // 6

        // Solution Five
        console.log(num * false + num * num - num); // 6

        // Solution Six
        console.log(false * num + true + true + true + true + true + true); // 6

    </script>
