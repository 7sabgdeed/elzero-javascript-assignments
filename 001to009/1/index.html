<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Learn JavaScript</title>
    
    <!--

    الكود رقم 1 هيطلع خطأ

    لأن كود الجافا سكريبت هيشتغل الأول
    قبل ما ال
    html
    يحمل

    فمش هيعرف يعدل على لون العنصر اللي
    id
    بتاعه
    el

    لأن كود ال
    html 
    لسه محملش أساسا

    فمن منظور الجافا سكريبت:
    العنصر اللي
    id
    بتاعه
    el
    مش موجود

    -->
    <script>
      // Code One
      document.getElementById("el").style.color = "red";
    </script>


    <!--

    الكود الثاني مش هيطلع ايرور

    مع انك حاطط كود الجافا سكريبت قبل كود ال
    html

    وده لأن الكود اللي في جافا سكريبت معناه استنى لحد ما كود
    ال
    html 
    يحمل وبعدها اشتغل


    وهو اللي النتيجة بتاعته هتظهر في الآخر لأنه آخر كود هيشتغل إن شاء الله

    وعشان تتأكد إن هو آخر كود هيشتغل جرب غير اللون اللي فيه للون تاني
    وهتلاقي إن لون ال
    h1
    في الآخر هيكون هو اللون ده اللي انت كتبته هنا (في الكود رقم 2)

    -->

    <script>
      // Code Two
      window.onload = function () {
        document.getElementById("el").style.color = "red";
      };
    </script>
  </head>
  <body>
    <h1 id="el">Page Title</h1>

    <!--
    
    الكود رقم 3 هيتشغل من غير خطأ

    ولكن النتيجة بتاعته هتظهر لوقت قليل جدا

    لأن الكود رقم 2 هيتشغل بعده علطول

    -->

    <script>
      // Code Three
      
      document.getElementById("el").style.color = "red";
    </script>
  </body>
</html>
