<body>
    
    <script>

        let nums = [2, 12, 11, 5, 10, 1, 99];

        let newArr = nums.reduce((accumulator, currentNum) => currentNum % 2 === 0 ? accumulator * currentNum : accumulator + currentNum, 1);
        
        console.log(newArr);    // 500

    </script>
