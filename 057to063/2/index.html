<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        function calculate(firstNum, secondNum, operation) {

            if (secondNum === undefined) {

                console.log(`Second Number is Not Found`);

            } else if (operation === undefined || operation.toLowerCase() === "add") {

                console.log(`${firstNum + secondNum}`);

            } else if (operation.toLowerCase() === "subtract") {

                console.log(`${firstNum - secondNum}`);

            } else if (operation.toLowerCase() === "multiply") {

                console.log(`${firstNum * secondNum}`);
            }
        }

        // Needed Output
        calculate(20); // Second Number is Not Found
        calculate(20, 30); // 50
        calculate(20, 30, 'add'); // 50
        calculate(20, 30, 'subtract'); // -10
        calculate(20, 30, 'multiply'); // 600

    </script>

</body>
</html>
