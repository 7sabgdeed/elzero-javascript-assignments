    <script>

        let theName = "Elzero";

        console.log(Array.from(theName));
        console.log([...theName]);
        console.log(theName.split(""));

        let arrayOfChars = [];

        for (let i = 0; i < theName.length; i++) {

            arrayOfChars.push(theName[i]);
        }

        console.log(arrayOfChars);

        console.log(Object.assign([], theName)); // بعد بحث على جوجل
        
        // Needed Output
        ['E', 'l', 'z', 'e', 'r', 'o']

    </script>
