<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form>

        <label for="user-name">Enter your username</label>
        <input id="user-name" type="text" name="user-name">

        <br>
        <br>

        <label for="email">Enter your e-mail</label>
        <input id="email" type="text" name="email">

        <br>        
        <br>
        
        <label for="age">Enter your age</label>
        <input id="age" type="number" name="age" min="9" max="135">

        <br>
        <br>

        <label for="favourite-color">Pick your Favourite Color</label>

        <select name="favourite-color" id="favourite-color">
            
            <option value="red">Red</option>
            <option value="brown">Brown</option>
            <option value="blue">blue</option>
            <option value="green">Green</option>
            <option value="purple">Purple</option>

        </select>

    </form>

    <script src="./main.js"></script>

</body>
</html>
