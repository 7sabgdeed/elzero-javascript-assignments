<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        let friends = ["Ahmed", "Sayed", "Eman", "Mahmoud", "Ameer", "Osama", "Sameh"];
        let letter = "a";

        let zero = letter.length - letter.length;
        let counter = zero;
        let arrayLength = friends.length;


        for (let i = zero; i < arrayLength; i++) {

            if (friends[i][zero].toUpperCase() !== letter.toUpperCase()) {

                counter++;

                console.log(`${counter} => ${friends[i]}`);
            }
        }

        // Output
        "1 => Sayed"
        "2 => Eman"
        "3 => Mahmoud"
        "4 => Osama"
        "5 => Sameh"

    </script>
    
</body>
</html>
