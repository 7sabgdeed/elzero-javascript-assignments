<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        // Examples
        console.log(100_000); // 100000
        console.log(100000); // 100000
        console.log(5e4 + 5e4); // 100000

        // Your Solutions
        console.log(Number("100000")); // 100000
        console.log(Math.round(99999.5)); // 100000
        console.log(Math.ceil(99999.1)); // 100000
        console.log(Math.floor(100000.99999)); // 100000
        console.log(Math.trunc(100000.1234)); // 100000
        console.log(parseInt(100000.95333)); // 100000
        console.log(parseFloat(100000.00)); // 100000
        console.log(+("100000.99".slice(0, 6))); // 100000
        console.log(true * ("99100000".substr(-6))); // 100000
        console.log(-(-("100000".toUpperCase()))); // 100000

    </script>

</body>
</html>
