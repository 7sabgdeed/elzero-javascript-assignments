    <script>

        // The Object To Work With

        let myFavBooks = {
            
        "السنة لعبد الله بن أحمد": {

            author: "عبد الله بن أحمد بن حنبل",
            price: 44.41,
        },

        "الشريعة للآجري": {

            author: "محمد بن الحسين الآجري",
            
            otherBooksFromTheAuther: {

                one: "تحريم النرد والشطرنج والملاهي",
                two: "أدب النفوس",
                three: "فضل قيام الليل التهجد",
            },

            price: 48,
        },

        "السنة لأبي بكر الخلال": {

            author: "أبو بكر أحمد بن محمد بن هارون الخلال",
            
            otherBooksFromTheAuther: {

            one: "أحكام النساء",
            two: "الأمر بالمعروف والنهي عن المنكر",
            three: "أحكام أهل الملل والردة",
            },

            price: 27,
        },

        };

        // Code One => How To Get Object Length ?
        let objectLength = Object.entries(myFavBooks).length;

        for (let i = 0; i < objectLength; i++) {

            console.log(`إسم الكتاب هو: ${Object.entries(myFavBooks)[i][0]}`);
            console.log(`الكاتب هو: ${myFavBooks[Object.entries(myFavBooks)[i][0]]["author"]}`);
            console.log(`السعر هو: $${myFavBooks[Object.entries(myFavBooks)[i][0]]["price"]}`);

            // Check If Nested Object Has Property (otherBooksFromTheAuther)
            if (myFavBooks[Object.entries(myFavBooks)[i][0]]["otherBooksFromTheAuther"] !== undefined) {

                console.log("كتب أخرى للمصنف -");
                console.log(`First => ${myFavBooks[Object.entries(myFavBooks)[i][0]]["otherBooksFromTheAuther"]["one"]}`);
                console.log(`Second => ${myFavBooks[Object.entries(myFavBooks)[i][0]]["otherBooksFromTheAuther"]["two"]}`);
                console.log(`Third => ${myFavBooks[Object.entries(myFavBooks)[i][0]]["otherBooksFromTheAuther"]["three"]}`);
            }
            
            console.log("#".repeat(20));
        }
